name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Skip backend (not yet implemented)
        run: echo "Backend project is under development. Build skipped."

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Temporarily disable caching until frontend project is set up
          # cache: 'npm'
          # cache-dependency-path: frontend/package-lock.json
      
      - name: Skip frontend (not yet implemented)
        run: echo "Frontend project is under development. Build skipped."

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2
      
      - name: Check markdown files
        run: markdownlint-cli2 "docs/**/*.md" "README.md" "CONTRIBUTING.md"
